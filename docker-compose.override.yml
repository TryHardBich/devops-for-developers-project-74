version: '3.8'

services:
  app:
    command: ["make", "dev"]
    volumes:
      - ./app:/app
      - /app/node_modules

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./services/caddy/Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      app:
        condition: service_started
